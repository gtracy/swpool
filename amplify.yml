version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Ensure we are using Node.js 24
        - nvm install 24
        - nvm use 24
        - node -v
        # Install dependencies
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
